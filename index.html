<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara - Horror Survival</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            pointer-events: auto;
        }
        .active-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        button {
            background: transparent;
            color: #880000;
            border: 2px solid #880000;
            padding: 15px 30px;
            margin: 10px;
            font-size: 24px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        button:hover {
            background: #880000;
            color: #000;
        }
        h1 {
            color: #ff0000;
            font-size: 64px;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 40px;
            letter-spacing: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-layer">
        <!-- Screens will be injected here by UI classes -->
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
